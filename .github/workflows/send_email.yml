name: Send hourly email

on:
  schedule:
    # Каждые 30 минут с 6:00 до 17:30 UTC = с 9:00 до 18:30 MSK
    # Но чтобы не выходить за 18:00 MSK, ставим до 15:30 UTC = 18:30 MSK
    - cron: '*/30 6-15 * * 1-5'
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run script
        run: python bx24.py
